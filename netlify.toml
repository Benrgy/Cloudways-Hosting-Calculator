[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  function = "blog-seo"
  path = "/blog/*"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-sitemap"

  [plugins.inputs]
    buildDir = "dist"
    exclude = ['/404', '/404.html']
    prettyURLs = true
    trailingSlash = true
